<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      background: #fff;
    }

    .header {
      background: #2563eb;
      color: #fff;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      word-break: break-word;
      line-height: 1.4;
    }

    .page-url {
      font-size: 11px;
      color: #9ca3af;
      word-break: break-all;
    }

    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      resize: none;
      height: 56px;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #2563eb; }

    .btn-save {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .btn-save:disabled { background: #93c5fd; cursor: not-allowed; }

    .status {
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      padding: 2px 0;
    }
    .status.success { color: #065f46; }
    .status.error   { color: #dc2626; }

    .btn-view {
      background: none;
      border: 1px solid #2563eb;
      color: #2563eb;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      display: none;
    }
    .btn-view.show { display: block; }

    .divider { border: none; border-top: 1px solid #f3f4f6; }
  </style>
</head>
<body>

<div class="header">
  📥 Save to Inbox
</div>

<div class="body">
  <div class="page-title" id="page-title">Loading…</div>
  <div class="page-url"   id="page-url"></div>

  <hr class="divider">

  <textarea id="desc" placeholder="Description (optional)"></textarea>

  <button class="btn-save" id="btn-save" onclick="save()">Save to Inbox</button>

  <div class="status" id="status"></div>

  <button class="btn-view" id="btn-view" onclick="openInbox()">View Inbox →</button>
</div>

<script src="popup.js"></script>
</body>
</html>
