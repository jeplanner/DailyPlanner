<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>New Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
<script src="https://unpkg.com/feather-icons"></script>
<script src="{{ url_for('static', filename='js/global.js') }}"></script>
<style>
  :root {
    --np-bg: #f7f8fa;
    --np-surface: #ffffff;
    --np-text: #1a1a2e;
    --np-text2: #6b7280;
    --np-text3: #9ca3af;
    --np-border: #e5e7eb;
    --np-primary: #2563eb;
    --np-primary-hover: #1d4ed8;
    --np-primary-light: #eff6ff;
    --np-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  html.dark {
    --np-bg: #0f172a;
    --np-surface: #1e293b;
    --np-text: #f1f5f9;
    --np-text2: #94a3b8;
    --np-text3: #64748b;
    --np-border: #334155;
    --np-primary-light: #1e3a5f;
    --np-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--np-bg);
    color: var(--np-text);
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .back-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .back-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--np-text2);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .back-link:hover { background: var(--np-border); color: var(--np-text); }
  .back-link svg { width: 16px; height: 16px; }

  .form-card {
    background: var(--np-surface);
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--np-shadow);
    border: 1px solid var(--np-border);
  }

  .form-card h1 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .form-card .subtitle {
    font-size: 14px;
    color: var(--np-text2);
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--np-text2);
    margin-bottom: 6px;
  }
  .form-group .required { color: var(--np-primary); }

  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--np-border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--np-bg);
    color: var(--np-text);
    outline: none;
    transition: all 0.2s;
  }
  .form-input:focus {
    border-color: var(--np-primary);
    background: var(--np-surface);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }
  .form-input::placeholder { color: var(--np-text3); }

  textarea.form-input { resize: vertical; min-height: 80px; }

  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--np-text3);
    margin-top: 4px;
  }

  /* Color picker */
  .color-section { margin-bottom: 24px; }
  .color-section label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--np-text2);
    margin-bottom: 8px;
  }
  .color-picker {
    display: flex;
    gap: 8px;
  }
  .color-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .color-dot:hover { transform: scale(1.1); }
  .color-dot.active { border-color: var(--np-text); box-shadow: 0 0 0 2px var(--np-surface); }

  /* Template chips */
  .template-section { margin-bottom: 24px; }
  .template-section label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--np-text2);
    margin-bottom: 8px;
  }
  .template-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .template-chip {
    padding: 6px 14px;
    border: 1px solid var(--np-border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--np-text2);
    background: var(--np-surface);
    cursor: pointer;
    transition: all 0.15s;
  }
  .template-chip:hover {
    border-color: var(--np-primary);
    color: var(--np-primary);
    background: var(--np-primary-light);
  }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--np-border);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--np-primary);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { background: var(--np-primary-hover); }
  .btn-ghost {
    background: transparent;
    color: var(--np-text2);
    border: 1px solid var(--np-border);
  }
  .btn-ghost:hover { background: var(--np-border); color: var(--np-text); }
  .btn svg { width: 18px; height: 18px; }

  @media (max-width: 480px) {
    .page-wrap { padding: 12px 16px 40px; }
    .form-card { padding: 24px 20px; }
    .form-card h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="nav-icons">{% include "_top_nav.html" %}</div>

<div class="page-wrap">
  <div class="back-row">
    <a href="/projects" class="back-link">
      <i data-feather="arrow-left"></i> Projects
    </a>
  </div>

  <div class="form-card">
    <h1>Create Project</h1>
    <p class="subtitle">Set up a new project to organize your tasks</p>

    <form method="post" id="project-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label>Project Name <span class="required">*</span></label>
        <input type="text" name="name" class="form-input" id="proj-name"
               placeholder="e.g., Product Launch, Website Redesign"
               required autofocus maxlength="100"
               oninput="updateCharCount()">
        <div class="char-count"><span id="name-count">0</span>/100</div>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="form-input" id="proj-desc"
                  placeholder="What's this project about? Goals, deadlines, context…"
                  rows="3" maxlength="500"
                  oninput="updateDescCount()"></textarea>
        <div class="char-count"><span id="desc-count">0</span>/500</div>
      </div>

      <div class="color-section">
        <label>Project Color</label>
        <div class="color-picker">
          <div class="color-dot active" style="background:#2563eb" data-color="#2563eb" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#7c3aed" data-color="#7c3aed" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#059669" data-color="#059669" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#d97706" data-color="#d97706" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#dc2626" data-color="#dc2626" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#ec4899" data-color="#ec4899" onclick="pickColor(this)"></div>
          <div class="color-dot" style="background:#6366f1" data-color="#6366f1" onclick="pickColor(this)"></div>
        </div>
      </div>

      <div class="template-section">
        <label>Quick Start Template</label>
        <div class="template-chips">
          <span class="template-chip" onclick="applyTemplate('blank')">Blank</span>
          <span class="template-chip" onclick="applyTemplate('sprint')">Sprint</span>
          <span class="template-chip" onclick="applyTemplate('launch')">Product Launch</span>
          <span class="template-chip" onclick="applyTemplate('personal')">Personal Goal</span>
        </div>
      </div>

      <div class="form-actions">
        <a href="/projects" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">
          <i data-feather="folder-plus"></i>
          Create Project
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  if (window.feather) feather.replace();

  function updateCharCount() {
    document.getElementById('name-count').textContent = document.getElementById('proj-name').value.length;
  }
  function updateDescCount() {
    document.getElementById('desc-count').textContent = document.getElementById('proj-desc').value.length;
  }

  function pickColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
  }

  function applyTemplate(type) {
    const name = document.getElementById('proj-name');
    const desc = document.getElementById('proj-desc');

    const templates = {
      blank: { name: '', desc: '' },
      sprint: {
        name: 'Sprint — ' + new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        desc: '2-week sprint. Key deliverables:\n- \n- \n- '
      },
      launch: {
        name: 'Product Launch',
        desc: 'Pre-launch:\n- Market research\n- Landing page\n- Beta testing\n\nLaunch:\n- Go-live\n- Marketing push\n\nPost-launch:\n- Metrics review\n- Bug fixes'
      },
      personal: {
        name: '',
        desc: 'Goal:\nWhy it matters:\nSuccess criteria:\nDeadline:'
      }
    };

    const t = templates[type];
    if (t.name) name.value = t.name;
    if (t.desc) desc.value = t.desc;
    updateCharCount();
    updateDescCount();
    name.focus();
  }
</script>
</body>
</html>
