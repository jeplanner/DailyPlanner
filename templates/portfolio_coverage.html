<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Trade Coverage — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
<script src="https://unpkg.com/feather-icons"></script>
<script src="{{ url_for('static', filename='js/global.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<style>
  body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-family); margin: 0; }
  .cv-app { max-width: 880px; margin: 0 auto; padding: 24px 20px 80px; }
  .cv-hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; margin-bottom: 18px; flex-wrap: wrap; }
  .cv-hero h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -.01em; }
  .cv-sub { color: var(--color-text-secondary); font-size: 13px; margin: 4px 0 0; max-width: 60ch; }

  .cv-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .cv-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    font-size: 13px; color: var(--color-text-secondary);
  }
  .cv-chip strong { color: var(--color-text); font-weight: 800; font-variant-numeric: tabular-nums; }
  .cv-chip.warn { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
  .cv-chip.warn strong { color: #b91c1c; }

  .cv-table-wrap {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead { background: var(--color-bg-subtle, #f1f5f9); }
  th { text-align: left; padding: 10px 14px; font-weight: 700; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--color-border); }
  tbody tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .fy { font-weight: 700; }
  .pill {
    display: inline-flex; padding: 1px 7px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700;
  }
  .pill-buy  { background: #fee2e2; color: #b91c1c; }
  .pill-sell { background: #dcfce7; color: #166534; }
  .pill-miss { background: #fef3c7; color: #92400e; }

  .cv-empty {
    background: var(--color-surface); border: 1px dashed var(--color-border);
    border-radius: 14px; padding: 32px; text-align: center;
    color: var(--color-text-secondary); font-size: 14px;
  }
  .cv-empty strong { display: block; color: var(--color-text); font-size: 16px; margin-bottom: 6px; }
  .cv-empty a { color: var(--color-primary); text-decoration: none; font-weight: 600; }

  .cv-back { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border: 1px solid var(--color-border); border-radius: 8px; text-decoration: none; color: var(--color-text); font-size: 13px; font-weight: 600; background: var(--color-surface); }
  .cv-back:hover { border-color: var(--color-primary); color: var(--color-primary); }

  .gap-banner {
    background: #fef3c7; border: 1px solid #fde68a; color: #92400e;
    padding: 12px 16px; border-radius: 12px; margin-bottom: 14px;
    font-size: 13px; line-height: 1.5;
  }
  .gap-banner strong { font-weight: 800; }
</style>
</head>
<body>
{% include "_top_nav.html" %}

<div class="cv-app">
  <header class="cv-hero">
    <div>
      <h1>Trade Coverage</h1>
      <p class="cv-sub">Buys + sells already imported, grouped by financial year. Use this to spot which years still need pulling from your broker.</p>
    </div>
    <a class="cv-back" href="/portfolio"><i data-feather="arrow-left" style="width:14px;height:14px"></i> Back to Portfolio</a>
  </header>

  <div id="cv-stats" class="cv-stats"></div>
  <div id="cv-gap"></div>
  <div id="cv-body">
    <div class="cv-empty">Loading…</div>
  </div>
</div>

<script>
const INR = v => v != null ? '₹' + Number(v).toLocaleString('en-IN', { maximumFractionDigits: 0 }) : '—';

async function load() {
  let data;
  try {
    const r = await fetch('/api/portfolio/coverage', { credentials: 'same-origin' });
    data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
  } catch (e) {
    document.getElementById('cv-body').innerHTML =
      `<div class="cv-empty"><strong>Couldn't load coverage</strong>${(e.message || '')}</div>`;
    return;
  }

  const total = data.total_transactions || 0;
  const fys = data.by_fy || [];
  const missing = data.missing_internal_fys || [];

  // Headline strip
  const stats = document.getElementById('cv-stats');
  const earliest = fys.length ? fys[0].earliest : '—';
  const latest = fys.length ? fys[fys.length - 1].latest : '—';
  stats.innerHTML = `
    <span class="cv-chip"><strong>${total}</strong> transactions</span>
    <span class="cv-chip"><strong>${fys.length}</strong> financial year${fys.length === 1 ? '' : 's'}</span>
    <span class="cv-chip">first: <strong>${earliest}</strong></span>
    <span class="cv-chip">last: <strong>${latest}</strong></span>
    ${missing.length ? `<span class="cv-chip warn">⚠ <strong>${missing.length}</strong> gap year${missing.length === 1 ? '' : 's'} inside the range</span>` : ''}
  `;

  // Gap banner — only if there are internal gaps. We don't warn about
  // years before the earliest because the user may have legitimately
  // not traded yet.
  if (missing.length) {
    document.getElementById('cv-gap').innerHTML = `
      <div class="gap-banner">
        <strong>Gaps detected:</strong> ${missing.join(', ')}.
        These years sit between FYs you already have, so they're almost
        certainly missing imports. Download those FYs from ICICI's
        tradeBook report and drop them into the Portfolio import dialog.
      </div>`;
  }

  if (!fys.length) {
    document.getElementById('cv-body').innerHTML = `
      <div class="cv-empty">
        <strong>No transactions imported yet.</strong>
        Go to <a href="/portfolio">Portfolio</a> → Import to upload your first ICICI tradeBook CSV.
      </div>`;
    return;
  }

  // Per-FY table — newest first so the most recent year is at the top
  // (matches how brokerage reports usually present the data).
  const fysReversed = [...fys].reverse();
  const rows = fysReversed.map(f => `
    <tr>
      <td class="fy">${f.fy}</td>
      <td class="num">${f.total}</td>
      <td><span class="pill pill-buy">${f.buys} buy${f.buys === 1 ? '' : 's'}</span> <span class="pill pill-sell">${f.sells} sell${f.sells === 1 ? '' : 's'}</span></td>
      <td class="num">${f.symbols}</td>
      <td class="num">${INR(f.buy_value)}</td>
      <td class="num">${INR(f.sell_value)}</td>
      <td>${f.earliest} → ${f.latest}</td>
    </tr>`).join('');

  document.getElementById('cv-body').innerHTML = `
    <div class="cv-table-wrap">
      <table>
        <thead>
          <tr>
            <th>FY</th>
            <th class="num">Trades</th>
            <th>Mix</th>
            <th class="num">Symbols</th>
            <th class="num">Buy ₹</th>
            <th class="num">Sell ₹</th>
            <th>Date range</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  if (window.feather) feather.replace();
}

load();
</script>
</body>
</html>
