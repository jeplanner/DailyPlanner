<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>Tasks Bucket — DailyPlanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
<script src="https://unpkg.com/feather-icons"></script>
<script src="{{ url_for('static', filename='js/global.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/quick_bucket.js') }}{% if js_v %}?v={{ js_v }}{% endif %}" defer></script>
<style>
  body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-family); margin: 0; }
  .qb-app { max-width: 720px; margin: 0 auto; padding: 24px 20px 80px; }

  .qb-hero { margin-bottom: 16px; }

  /* Bucket-themed stats card — at a glance: how full today's bucket
     is + open/done counts + a daily nudge + Focus trigger. */
  .qb-statbar {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: center; gap: 16px;
    padding: 14px 16px; margin-bottom: 14px;
    background: linear-gradient(135deg, #eef2ff 0%, #f0fdfa 100%);
    border: 1px solid #c7d2fe; border-radius: 14px;
  }
  .qb-bucket-fancy {
    width: 80px; height: 90px; display: block;
    filter: drop-shadow(0 3px 6px rgba(15,23,42,.10));
  }
  .qb-bucket-fancy #qb-water-fill,
  .qb-bucket-fancy #qb-wave {
    transition: y .6s cubic-bezier(.2,.8,.2,1),
                height .6s cubic-bezier(.2,.8,.2,1),
                d .6s cubic-bezier(.2,.8,.2,1);
  }
  /* Animated wave drift left-right so the water surface feels alive. */
  .qb-bucket-fancy #qb-wave-group { animation: qbWaveDrift 4s linear infinite; }
  @keyframes qbWaveDrift {
    from { transform: translateX(0); }
    to   { transform: translateX(-30px); }
  }
  /* Subtle bubble rise. */
  .qb-bucket-fancy .qb-bubble {
    animation: qbBubble 5s ease-in infinite;
    transform-origin: center;
  }
  .qb-bucket-fancy #qb-b2 { animation-duration: 4s; animation-delay: 1.4s; }
  .qb-bucket-fancy #qb-b3 { animation-duration: 6s; animation-delay: 2.6s; }
  @keyframes qbBubble {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    15%  { opacity: .8; }
    100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
  }
  .qb-stats-text { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .qb-stats-row {
    display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
    color: var(--color-text-secondary);
  }
  .qb-stats-num {
    font-size: 22px; font-weight: 800; line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .qb-stats-num--done { color: #047857; }
  .qb-stats-num--open { color: #4338ca; }
  .qb-stats-lbl {
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase; color: var(--color-text-secondary);
  }
  .qb-stats-sep { color: var(--color-text-secondary); margin: 0 4px; }
  .qb-quote {
    margin: 0; font-size: 12.5px; line-height: 1.4;
    color: #475569; font-style: italic;
  }

  /* Focus timer trigger — replaces the always-visible widget. */
  .qb-focus-trigger {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    color: var(--color-text); font: inherit;
    font-size: 13px; font-weight: 700; letter-spacing: .02em;
    cursor: pointer; white-space: nowrap;
    transition: background .12s, border-color .12s, transform .08s;
  }
  .qb-focus-trigger:hover { background: var(--color-surface-secondary, #f3f4f6); }
  .qb-focus-trigger:active { transform: scale(.97); }
  .qb-focus-trigger svg { width: 14px; height: 14px; }
  .qb-focus-trigger.is-running {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; border-color: transparent;
    font-variant-numeric: tabular-nums;
    box-shadow: 0 4px 14px rgba(99,102,241,.3);
  }
  .qb-focus-trigger.is-ended {
    background: linear-gradient(135deg, #fde68a, #fbbf24);
    color: #92400e; border-color: #fbbf24;
  }

  @media (max-width: 520px) {
    .qb-statbar {
      grid-template-columns: 64px 1fr;
      grid-template-rows: auto auto;
      column-gap: 12px;
    }
    .qb-bucket-fancy { width: 64px; height: 72px; }
    .qb-focus-trigger {
      grid-column: 1 / -1; justify-self: stretch; justify-content: center;
    }
  }
  .qb-hero h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -.02em; }
  .qb-sub { color: var(--color-text-secondary); font-size: 13px; margin: 4px 0 0; }

  .qb-add {
    display: flex; gap: 8px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 12px; padding: 10px; margin-bottom: 18px;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
  }
  .qb-add input {
    flex: 1; min-width: 0;
    padding: 9px 12px; font: inherit; font-size: 14px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text);
    transition: border-color .12s, box-shadow .12s;
  }
  .qb-add input:focus {
    outline: none; border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(37,99,235,.15));
  }
  .qb-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px;
    font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text);
    transition: background .12s, border-color .12s;
  }
  .qb-btn-primary {
    background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary);
  }
  .qb-btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
  .qb-btn:hover { background: var(--color-surface-secondary, #f3f4f6); }
  #qb-mic-btn.is-on {
    background: #ef4444; color: #fff; border-color: #ef4444;
    animation: qbMicPulse 1.2s ease-in-out infinite;
  }
  @keyframes qbMicPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
    50%      { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
  }
  #qb-handsfree-btn.is-on {
    background: #10b981; color: #fff; border-color: #10b981;
  }
  #qb-handsfree-btn.is-on::after {
    content: "•"; margin-left: 4px;
    animation: qbBlink 1.4s ease-in-out infinite;
  }
  @keyframes qbBlink {
    0%, 100% { opacity: .3; }
    50%      { opacity: 1; }
  }

  /* Visible status under the add form so the user can tell whether
     the wake-word listener is actually running (vs button just being
     toggled on with mic permission denied). */
  .qb-handsfree-status {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; margin-bottom: 10px;
    background: #ecfdf5; border: 1px solid #a7f3d0;
    border-radius: 10px;
    font-size: 12.5px; color: #065f46; font-weight: 600;
  }
  .qb-handsfree-status[hidden] { display: none; }
  .qb-handsfree-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #10b981;
    animation: qbBlink 1.4s ease-in-out infinite;
  }

  .qb-group { margin-bottom: 16px; }
  .qb-group-head {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 6px; padding: 6px 8px;
    font-size: 11.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .qb-group-head .qb-count {
    margin-left: auto; font-weight: 600; color: var(--color-text-muted, var(--color-text-secondary));
    letter-spacing: 0; text-transform: none;
  }
  .qb-group--now    .qb-group-head { color: #b91c1c; }
  .qb-group--today  .qb-group-head { color: #1d4ed8; }
  .qb-group--future .qb-group-head { color: #6b7280; }

  .qb-list {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
  }
  .qb-list:empty { display: none; }

  .qb-row {
    display: grid; grid-template-columns: 18px minmax(0, 1fr) auto auto auto;
    align-items: center; gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-border-light, var(--color-border));
    transition: background .12s;
  }
  .qb-row:last-child { border-bottom: none; }
  .qb-row:hover { background: var(--color-surface-secondary, color-mix(in srgb, var(--color-primary) 4%, transparent)); }
  .qb-row[draggable="true"] { cursor: grab; }
  .qb-row.is-dragging { opacity: 0.4; cursor: grabbing; }
  .qb-row.is-dragging * { pointer-events: none; }

  .qb-check {
    appearance: none; width: 18px; height: 18px;
    border: 1.5px solid var(--color-text-tertiary, #9ca3af);
    border-radius: 4px; background: transparent;
    cursor: pointer; position: relative; transition: background .12s, border-color .12s;
  }
  .qb-check:checked { background: var(--color-primary); border-color: var(--color-primary); }
  .qb-check:checked::after {
    content: "✓"; color: #fff; font-size: 12px; font-weight: 800;
    position: absolute; left: 2px; top: -3px;
  }

  .qb-text {
    font-size: 14px; color: var(--color-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer;
    padding: 4px 0;
    border-radius: 4px;
  }
  .qb-text:hover { background: rgba(99,102,241,.06); }

  .qb-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 999px;
    font: inherit; font-size: 11.5px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid var(--color-border); background: var(--color-surface);
    color: var(--color-text-secondary); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .qb-toggle:hover { filter: brightness(1.05); }
  .qb-toggle--now    { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .qb-toggle--future { background: #f3f4f6; color: #4b5563; border-color: #d1d5db; }
  /* Minute buckets — tightest deadlines, deep red. */
  .qb-toggle--5m, .qb-toggle--15m,
  .qb-toggle--30m, .qb-toggle--45m { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
  /* Hour buckets — red → amber → green → blue ramp so closer
     deadlines pop more than later ones at a glance. */
  .qb-toggle--1h, .qb-toggle--2h { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
  .qb-toggle--3h, .qb-toggle--4h { background: #fffbeb; color: #b45309; border-color: #fde68a; }
  .qb-toggle--5h, .qb-toggle--6h { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
  .qb-toggle--7h, .qb-toggle--8h { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

  /* Picker popover — anchored under the clicked toggle pill. */
  .qb-picker {
    position: absolute; z-index: 100;
    display: grid; grid-template-columns: repeat(5, minmax(46px, 1fr));
    gap: 4px; padding: 6px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(15,23,42,.18);
    min-width: 240px;
  }
  .qb-pick {
    padding: 6px 6px; font: inherit; font-size: 12px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid var(--color-border); background: var(--color-surface);
    color: var(--color-text-secondary);
    border-radius: 6px; cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .qb-pick:hover { background: var(--color-surface-secondary, #f3f4f6); color: var(--color-text); }
  .qb-pick.is-current {
    background: var(--color-primary); color: var(--color-on-primary);
    border-color: var(--color-primary);
  }
  .qb-toggle--overdue {
    background: #ef4444; color: #fff; border-color: #ef4444;
    animation: qbPulse 1.6s ease-in-out infinite;
  }
  @keyframes qbPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.45); }
    50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  }
  .qb-row.is-overdue {
    background: linear-gradient(90deg, rgba(239,68,68,.08), transparent 60%);
    box-shadow: inset 3px 0 0 0 #ef4444;
  }

  .qb-icon-btn {
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; padding: 6px;
    color: var(--color-text-secondary); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .qb-icon-btn:hover { background: var(--color-surface-secondary, #f3f4f6); color: #b91c1c; border-color: var(--color-border); }
  .qb-icon-btn svg { width: 14px; height: 14px; }

  .qb-empty {
    padding: 24px; text-align: center;
    color: var(--color-text-secondary); font-size: 13px;
    background: var(--color-surface); border: 1px dashed var(--color-border);
    border-radius: 12px;
  }

  /* Done section — closed items kept visible at the bottom. */
  .qb-group--done .qb-group-head { color: #6b7280; }
  .qb-row.is-done { opacity: 0.6; }
  .qb-row.is-done .qb-text { text-decoration: line-through; color: var(--color-text-muted, #6b7280); }
  .qb-row.is-done .qb-toggle { display: none; }

  /* "Move to category" modal */
  .qb-modal-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,.5);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
    /* Allow the modal to scroll with the page if it grows past the
       viewport on tiny screens — beats the modal getting clipped. */
    overflow-y: auto;
  }
  .qb-modal-backdrop.is-open { display: flex; }
  .qb-modal {
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 14px; max-width: 520px; width: 100%;
    /* dvh = dynamic viewport height. Unlike vh it shrinks when the
       browser address bar and the on-screen keyboard show up, so the
       modal never gets pushed off-screen on mobile. */
    max-height: calc(100dvh - 32px); overflow: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,.25);
  }
  /* On phones the centered-flex layout gets shoved around when the
     soft keyboard opens. Anchor to the top with breathing room so the
     popup stays where the user can see it. */
  @media (max-width: 639px) {
    .qb-modal-backdrop {
      align-items: flex-start;
      padding: 24px 12px;
    }
    .qb-modal {
      max-height: calc(100dvh - 48px);
    }
  }
  .qb-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--color-border);
  }
  .qb-modal-head h3 { font-size: 15px; font-weight: 800; margin: 0; }
  .qb-modal-body { padding: 16px; }
  .qb-modal-foot {
    display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap;
    padding: 12px 16px; border-top: 1px solid var(--color-border);
  }
  .qb-modal-text {
    font-size: 14px; line-height: 1.45; color: var(--color-text);
    padding: 8px 10px; border-radius: 8px;
    background: var(--color-surface-secondary, #f3f4f6);
    margin-bottom: 12px;
  }
  .qb-modal-section h4 {
    font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    color: var(--color-text-secondary); margin: 0 0 6px;
  }
  .qb-cat-grid {
    display: grid; gap: 6px; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    margin-bottom: 14px;
  }
  .qb-cat-btn {
    padding: 10px; border-radius: 8px; border: 1px solid var(--color-border);
    background: var(--color-surface); color: var(--color-text);
    font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    text-align: left; transition: background .12s, border-color .12s;
  }
  .qb-cat-btn:hover { background: var(--color-surface-secondary, #f3f4f6); border-color: var(--color-primary); }
  .qb-cat-btn.is-current { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); }

  .qb-form-grid {
    display: grid; gap: 10px;
    grid-template-columns: 1fr 1fr;
  }
  @media (max-width: 480px) { .qb-form-grid { grid-template-columns: 1fr; } }
  .qb-form-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .qb-form-field--wide { grid-column: 1 / -1; }
  .qb-form-field label {
    font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .qb-form-field input,
  .qb-form-field select,
  .qb-form-field textarea {
    padding: 8px 10px; font: inherit; font-size: 13.5px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text);
    transition: border-color .12s, box-shadow .12s;
    width: 100%; box-sizing: border-box;
  }
  .qb-form-field textarea { resize: vertical; min-height: 60px; }
  .qb-form-field input:focus,
  .qb-form-field select:focus,
  .qb-form-field textarea:focus {
    outline: none; border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(37,99,235,.15));
  }
  .qb-form-note {
    margin: 0; padding: 10px 12px; border-radius: 8px;
    background: var(--color-surface-secondary, #f3f4f6);
    font-size: 12.5px; color: var(--color-text-secondary); line-height: 1.45;
  }
  .qb-form-note-inline {
    font-weight: 500; text-transform: none; letter-spacing: 0;
    color: var(--color-text-secondary); font-size: 11px;
  }
  .qb-edit-text-input {
    width: 100%; box-sizing: border-box;
    padding: 10px 12px; font: inherit; font-size: 15px; line-height: 1.45;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text);
    resize: vertical; min-height: 60px; word-break: break-word;
  }
  .qb-edit-text-input:focus {
    outline: none; border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(37,99,235,.15));
  }
  .qb-row-icon-action {
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; padding: 6px;
    color: var(--color-text-secondary); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .qb-row-icon-action:hover {
    background: var(--color-surface-secondary, #f3f4f6);
    color: var(--color-primary); border-color: var(--color-border);
  }
  .qb-row-icon-action svg { width: 14px; height: 14px; }

  /* ── Pomodoro widget ──────────────────────────────────── */
  .qb-pomo {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 14px;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
    transition: box-shadow .2s, background .2s;
  }
  .qb-pomo.is-running {
    box-shadow: 0 0 0 2px rgba(99,102,241,.35), 0 1px 3px rgba(15,23,42,.04);
  }
  .qb-pomo.is-ended {
    background: linear-gradient(90deg, #fef3c7, transparent 70%);
    border-color: #fbbf24;
  }
  .qb-pomo-time {
    font-variant-numeric: tabular-nums;
    font-size: 28px; font-weight: 800; letter-spacing: -.02em;
    min-width: 92px; color: var(--color-text);
  }
  .qb-pomo.is-running .qb-pomo-time { color: #4338ca; }
  .qb-pomo.is-ended   .qb-pomo-time { color: #92400e; }
  .qb-pomo-controls { display: inline-flex; gap: 6px; }
  .qb-pomo-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 999px;
    border: 1px solid var(--color-border); background: var(--color-surface);
    color: var(--color-text); cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .qb-pomo-icon svg { width: 16px; height: 16px; }
  .qb-pomo-icon:hover { background: var(--color-surface-secondary, #f3f4f6); }
  .qb-pomo-icon--primary {
    background: var(--color-primary); color: var(--color-on-primary);
    border-color: var(--color-primary);
  }
  .qb-pomo-icon--primary:hover {
    background: var(--color-primary-hover); border-color: var(--color-primary-hover);
  }
  .qb-pomo-presets {
    display: inline-flex; gap: 4px; margin-left: auto; flex-wrap: wrap;
  }
  .qb-pomo-dur {
    padding: 4px 10px; border-radius: 999px;
    font: inherit; font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    border: 1px solid var(--color-border); background: var(--color-surface);
    color: var(--color-text-secondary); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .qb-pomo-dur:hover { background: var(--color-surface-secondary, #f3f4f6); color: var(--color-text); }
  .qb-pomo-dur.is-current {
    background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary);
  }
  .qb-pomo-prompt-input {
    width: 100%; box-sizing: border-box;
    padding: 10px 12px; font: inherit; font-size: 15px; line-height: 1.4;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text);
    transition: border-color .12s, box-shadow .12s;
    /* Soft wrap of long text instead of horizontal scroll. */
    word-break: break-word; resize: vertical;
    min-height: 60px;
  }
  .qb-pomo-prompt-input:focus {
    outline: none; border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(37,99,235,.15));
  }
  /* Inline focus-title input, lives directly inside the timer popup. */
  #qb-pomo-inline-title { margin-bottom: 12px; }
  #qb-pomo-inline-title.is-shake {
    animation: qbShake .35s ease;
    border-color: #b91c1c;
    box-shadow: 0 0 0 3px rgba(185,28,28,.15);
  }
  #qb-pomo-inline-title:disabled,
  #qb-pomo-inline-title[readonly] {
    background: var(--color-surface-secondary, #f3f4f6);
    color: var(--color-text);
    cursor: default;
  }
  @keyframes qbShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<div class="nav-icons">
  {% include "_top_nav.html" %}
</div>

<main class="qb-app">

  <header class="qb-hero">
    <h1>Tasks Bucket</h1>
    <p class="qb-sub">Quick add. Toggle when. Done when done.</p>
  </header>

  <section class="qb-statbar" id="qb-statbar" aria-label="Today's progress">
    <!-- Bucket icon. The interior rect's height is updated in JS to
         visualise today's completion ratio (filled = done). -->
    <!-- ── FANCY BUCKET ──────────────────────────────────────
         Metallic bucket with a wooden handle, soft ground shadow,
         and water inside that fills as today's done count rises.
         The water surface has an animated wave so it feels alive.
         Water height is updated in JS via the qb-water-fill rect. -->
    <svg class="qb-bucket-fancy" viewBox="0 0 100 112" aria-hidden="true">
      <defs>
        <!-- Brushed-metal sheen for the bucket body. -->
        <linearGradient id="qbMetalGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#6B7785"/>
          <stop offset="22%"  stop-color="#C8D1DA"/>
          <stop offset="50%"  stop-color="#F1F4F8"/>
          <stop offset="78%"  stop-color="#A6B0BB"/>
          <stop offset="100%" stop-color="#566270"/>
        </linearGradient>
        <linearGradient id="qbRimGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#566270"/>
          <stop offset="50%"  stop-color="#A6B0BB"/>
          <stop offset="100%" stop-color="#3F4750"/>
        </linearGradient>
        <linearGradient id="qbWaterGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#67E8F9"/>
          <stop offset="55%"  stop-color="#0891B2"/>
          <stop offset="100%" stop-color="#0E5870"/>
        </linearGradient>
        <linearGradient id="qbHandleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#7B3F00"/>
          <stop offset="50%"  stop-color="#A86A2A"/>
          <stop offset="100%" stop-color="#5C2D02"/>
        </linearGradient>
        <radialGradient id="qbGroundShadow" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="rgba(0,0,0,.32)"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
        </radialGradient>
        <clipPath id="qbBucketInside">
          <!-- Inner shape, slightly inset from the body so water
               stays inside the metal walls. -->
          <path d="M 24 30 Q 24 29, 50 29 Q 76 29, 76 30 L 71 92 Q 71 96, 50 96 Q 29 96, 29 92 Z"/>
        </clipPath>
      </defs>

      <!-- Soft ground shadow under the bucket. -->
      <ellipse cx="50" cy="103" rx="34" ry="4" fill="url(#qbGroundShadow)"/>

      <!-- Wooden handle, drawn behind the body. -->
      <path d="M 26 27 Q 26 5, 50 5 Q 74 5, 74 27"
            fill="none" stroke="url(#qbHandleGrad)" stroke-width="3.2"
            stroke-linecap="round"/>
      <!-- Handle attachment rivets. -->
      <circle cx="26" cy="27" r="2.6" fill="#3F4750"/>
      <circle cx="74" cy="27" r="2.6" fill="#3F4750"/>
      <circle cx="26" cy="27" r="1.0" fill="#1F2937"/>
      <circle cx="74" cy="27" r="1.0" fill="#1F2937"/>

      <!-- Bucket body fill (metallic). -->
      <path d="M 22 28 Q 22 27, 50 27 Q 78 27, 78 28 L 73 92 Q 73 96, 50 96 Q 27 96, 27 92 Z"
            fill="url(#qbMetalGrad)"/>

      <!-- Water inside — height/Y updated in JS, wave overlay
           translates left-right for liveliness. -->
      <g clip-path="url(#qbBucketInside)">
        <rect id="qb-water-fill" x="0" y="96" width="100" height="0"
              fill="url(#qbWaterGrad)"/>
        <!-- Crest of the water: animated wave. -->
        <g id="qb-wave-group">
          <path id="qb-wave" d=""
                fill="rgba(255,255,255,.22)"/>
        </g>
        <!-- Subtle bubbles drifting up. -->
        <circle class="qb-bubble" id="qb-b1" cx="36" cy="0" r="1.2" fill="rgba(255,255,255,.55)"/>
        <circle class="qb-bubble" id="qb-b2" cx="58" cy="0" r="0.9" fill="rgba(255,255,255,.45)"/>
        <circle class="qb-bubble" id="qb-b3" cx="48" cy="0" r="0.7" fill="rgba(255,255,255,.4)"/>
      </g>

      <!-- Vertical body highlights. -->
      <path d="M 32 31 Q 30 60, 33 90" stroke="rgba(255,255,255,.55)"
            stroke-width="1.1" fill="none" stroke-linecap="round"/>
      <path d="M 68 31 Q 70 60, 67 90" stroke="rgba(0,0,0,.18)"
            stroke-width="1.4" fill="none" stroke-linecap="round"/>

      <!-- Bucket rim (elliptical band). -->
      <ellipse cx="50" cy="27" rx="28.2" ry="5.2"
               fill="url(#qbRimGrad)" stroke="#3F4750" stroke-width=".8"/>
      <!-- Inside opening (dark hole). -->
      <ellipse cx="50" cy="27" rx="25" ry="3.6" fill="#1A2027"/>
      <!-- Inner rim highlight. -->
      <ellipse cx="50" cy="25.5" rx="22" ry="1.4"
               fill="none" stroke="rgba(255,255,255,.25)" stroke-width=".7"/>

      <!-- Bottom rim band. -->
      <ellipse cx="50" cy="92" rx="23" ry="4"
               fill="none" stroke="#3F4750" stroke-width=".8"/>
      <ellipse cx="50" cy="93" rx="23" ry="4"
               fill="none" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
    </svg>
    <div class="qb-stats-text">
      <div class="qb-stats-row">
        <span class="qb-stats-num qb-stats-num--done" id="qb-stat-done">0</span>
        <span class="qb-stats-lbl">done today</span>
        <span class="qb-stats-sep">·</span>
        <span class="qb-stats-num qb-stats-num--open" id="qb-stat-open">0</span>
        <span class="qb-stats-lbl">open</span>
      </div>
      <p class="qb-quote" id="qb-quote">…</p>
    </div>
    <button class="qb-focus-trigger" id="qb-focus-trigger" type="button"
            title="Open the Pomodoro timer">
      <i data-feather="zap"></i>
      <span id="qb-focus-trigger-label">Focus</span>
    </button>
  </section>

  <div id="qb-handsfree-status" class="qb-handsfree-status" hidden>
    <span class="qb-handsfree-dot"></span>
    <span id="qb-handsfree-status-text">Listening — say "Hello" to dictate</span>
  </div>

  <form id="qb-add-form" class="qb-add" autocomplete="off">
    <input id="qb-add-input" type="text" placeholder="What needs doing? Press Enter to add."
           maxlength="500">
    <button id="qb-mic-btn" class="qb-btn" type="button" title="Dictate a task">
      <i data-feather="mic"></i>
    </button>
    <button id="qb-handsfree-btn" class="qb-btn" type="button"
            title="Hands-free — say &quot;Hello&quot; to dictate, &quot;Bye&quot; to stop">
      <i data-feather="radio"></i>
    </button>
    <button id="qb-add-btn" class="qb-btn qb-btn-primary" type="submit">
      <i data-feather="plus"></i> Add
    </button>
  </form>

  <div id="qb-groups"></div>
  <div id="qb-empty" class="qb-empty" hidden>Nothing in the bucket — add one above.</div>
</main>

<!-- Pomodoro timer popup. The trigger button on the stats card opens
     this; the timer keeps ticking even when the popup is closed. -->
<div class="qb-modal-backdrop" id="qb-pomo-popup" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="qb-modal" style="max-width: 380px;">
    <div class="qb-modal-head">
      <h3>Pomodoro timer</h3>
      <button class="qb-row-icon-action" id="qb-pomo-popup-close" type="button" aria-label="Close">
        <i data-feather="x"></i>
      </button>
    </div>
    <div class="qb-modal-body">
      <textarea id="qb-pomo-inline-title" class="qb-pomo-prompt-input"
                rows="2" maxlength="200"
                placeholder="What are you focusing on?"
                autocomplete="off"></textarea>
      <section class="qb-pomo" id="qb-pomo" aria-label="Pomodoro timer">
        <div class="qb-pomo-time" id="qb-pomo-time">25:00</div>
        <div class="qb-pomo-controls">
          <button class="qb-pomo-icon qb-pomo-icon--primary" id="qb-pomo-play" type="button" title="Start">
            <i data-feather="play"></i>
          </button>
          <button class="qb-pomo-icon" id="qb-pomo-reset" type="button" title="Reset">
            <i data-feather="rotate-ccw"></i>
          </button>
        </div>
        <div class="qb-pomo-presets">
          <button class="qb-pomo-dur" data-min="15" type="button">15m</button>
          <button class="qb-pomo-dur is-current" data-min="25" type="button">25m</button>
          <button class="qb-pomo-dur" data-min="50" type="button">50m</button>
          <button class="qb-pomo-dur" data-min="90" type="button">90m</button>
        </div>
      </section>
    </div>
  </div>
</div>

<div id="qb-picker" class="qb-picker" role="menu" hidden></div>

<!-- Edit + optional move modal: opened by tapping a row. The text is
     always editable. Picking a category expands the form for moving
     to a destination module. -->
<div class="qb-modal-backdrop" id="qb-move-modal" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="qb-modal">
    <div class="qb-modal-head">
      <h3 id="qb-move-title">Edit task</h3>
      <button class="qb-row-icon-action" id="qb-move-close" type="button" aria-label="Close"><i data-feather="x"></i></button>
    </div>
    <div class="qb-modal-body">
      <div class="qb-modal-section">
        <h4>Task</h4>
        <textarea id="qb-edit-text-input" class="qb-edit-text-input"
                  rows="2" maxlength="500"
                  placeholder="What needs doing?"></textarea>
      </div>
      <div class="qb-modal-section">
        <h4>Move to module <span class="qb-form-note-inline">(optional)</span></h4>
        <div class="qb-cat-grid" id="qb-move-cats"></div>
      </div>
      <div class="qb-modal-section" id="qb-move-form-wrap" hidden>
        <h4 id="qb-move-form-title">Details</h4>
        <form id="qb-move-form" class="qb-form-grid" autocomplete="off"></form>
        <p class="qb-form-note" id="qb-move-form-note" hidden></p>
      </div>
    </div>
    <div class="qb-modal-foot">
      <button class="qb-btn" id="qb-move-cancel" type="button">Cancel</button>
      <button class="qb-btn qb-btn-primary" id="qb-move-save" type="button">
        <i data-feather="check"></i> <span id="qb-move-save-label">Save</span>
      </button>
    </div>
  </div>
</div>

<script>
  window.QB_BUCKETS = {{ buckets|tojson }};
</script>

</body>
</html>
