     GLOBAL TOP NAV / CONTEXT HEADER (PLANNER ICON SYSTEM v2)

<!-- ======================================================
     GLOBAL TOP NAV / CONTEXT HEADER
     Notion-Style Sidebar Navigation (Enhanced)
====================================================== -->

<meta name="csrf-token" content="{{ csrf_token() }}">
<link rel="stylesheet" href="/static/design-system.css">
<link rel="stylesheet" href="/static/components.css">
<script src="https://unpkg.com/feather-icons"></script>
<script src="/static/js/global.js"></script>
<script src="/static/js/toast.js"></script>

<style>

/* ===== HEADER ===== */
.top-context{
  width:100%;
  padding:10px 18px;
  display:flex;
  align-items:center;
  gap:16px;
  background:#ffffff;
  border-bottom:1px solid #e5e7eb;
}
.date-row{
  border-left:1px solid #e5e7eb;
  padding-left:12px;
}

.hamburger{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:18px;
  cursor:pointer;
  border:none;
  background:none;
  color:#111827;
  font-weight:500;
  padding:4px 8px;
  border-radius:6px;
}

.hamburger:hover{
  background:#f3f4f6;
}

/* DATE ROW */

.date-row{
  display:flex;
  gap:12px;
  align-items:center;
  font-size:14px;
  color:#374151;
}

.date-row .time{
  font-weight:600;
  color:#2563eb;
}

/* ===== SIDEBAR ===== */

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:270px;
  height:100%;
  background:#ffffff;
  box-shadow:4px 0 18px rgba(0,0,0,.12);
  padding:20px 16px;
  transform:translateX(-100%);
  transition:transform .25s ease;
  z-index:1100;
  overflow-y:auto;
}

/* OPEN STATE */

.sidebar.open{
  transform:translateX(0);
}

/* HEADER */

.sidebar-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
}

/* NAV LINKS */

.sidebar-nav{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.sidebar-nav a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:#374151;
  font-size:14px;
  padding:8px 10px;
  border-radius:8px;
}

.sidebar-nav a:hover{
  background:#f3f4f6;
}

.sidebar-nav svg{
  width:18px;
  height:18px;
}

/* ACTIVE PAGE */

.sidebar-nav a.active{
  background:#2563eb;
  color:white;
}

.sidebar-nav a.active svg{
  stroke:white;
}

/* DIVIDER */

.sidebar hr{
  border:none;
  border-top:1px solid #e5e7eb;
  margin:14px 0;
}
body.menu-open{
  overflow:hidden;
}
/* OVERLAY */

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(2px);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
  z-index:1050;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* SECTION TITLE */

.section-title{
  font-size:15px;
  font-weight:600;
  color:#111827;
  margin-top:6px;
}
.planner-toggle{
  display:flex;
  gap:6px;
  margin-bottom:14px;
  background:#eef2f7;
  padding:4px;
  border-radius:10px;
  width:fit-content;
}

.toggle-btn{
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:6px 10px;
  border-radius:8px;
  color:#6b7280;
}

.toggle-btn.active{
  background:#ffffff;
  color:#2563eb;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}
</style>


<!-- ===== OVERLAY ===== -->

<div id="overlay" class="overlay" onclick="closeSidebar()"></div>


<!-- ===== SIDEBAR ===== -->

<div id="sidebar" class="sidebar">

  <div class="sidebar-title">
    Planner
  </div>

  <div class="sidebar-nav">

    <a href="/" title="Priorities — Eisenhower matrix">
      <i data-feather="target"></i>
      Priorities
    </a>

    <a href="/calendar" title="Calendar — day / week view">
      <i data-feather="calendar"></i>
      Calendar
    </a>

    <a href="/health" title="Health tracking">
      <i data-feather="heart"></i>
      Health
    </a>

    <a href="/projects" title="All projects">
      <i data-feather="briefcase"></i>
      Projects
    </a>

    <a href="/projects/timeline" title="Roadmap — projects over time">
      <i data-feather="git-branch"></i>
      Roadmap
    </a>

    <hr>

    <a href="/summary?view=daily" title="Daily review">
      <i data-feather="calendar"></i>
      Daily Review
    </a>

    <a href="/summary?view=weekly" title="Weekly review">
      <i data-feather="bar-chart-2"></i>
      Weekly Review
    </a>
    {% if project is defined %}

    <a href="/projects/{{ project.project_id }}/gantt" title="Gantt chart for this project">
      <i data-feather="bar-chart"></i>
      Gantt Chart
    </a>

    <a href="/projects/{{ project.project_id }}/tasks" title="Tasks for this project">
      <i data-feather="trello"></i>
      Tasks
    </a>

    {% endif %}

    <hr>

    <a href="/notes/scribble" title="Notes">
      <i data-feather="edit-3"></i>
      Notes
    </a>

    <a href="/references" title="Knowledge base — articles, links, AI-answerable content">
      <i data-feather="book-open"></i>
      Knowledge Base
    </a>

    <a href="/refcards" title="Playbook — SOPs, credentials, checklists, cheat sheets">
      <i data-feather="clipboard"></i>
      Playbook
    </a>

    <a href="/portfolio" title="Investments — stocks, MFs, bonds, gold">
      <i data-feather="trending-up"></i>
      Investments
    </a>

    <a href="/inbox" title="Inbox">
      <i data-feather="inbox"></i>
      Inbox
    </a>

    <hr>

    <a href="javascript:void(0)" onclick="toggleDarkMode()" style="display:flex;align-items:center;gap:8px;">
      <i data-feather="moon" id="dark-mode-icon"></i>
      Dark Mode
    </a>

    <a href="/logout">
      <i data-feather="log-out"></i>
      Logout
    </a>
  </div>

</div>


<!-- ===== HEADER ===== -->

<div class="top-context">

  <button class="hamburger" onclick="toggleSidebar()">
  ☰ <span>Menu</span>
</button>

  <div class="date-row">
    <span id="live-date"></span>
    <span class="time" id="live-time"></span>
  </div>

</div>


<div class="section-title">
  {{ section_title }}
</div>


<script>

/* SIDEBAR CONTROL */

function toggleSidebar(){

  const sidebar = document.getElementById("sidebar")
  const overlay = document.getElementById("overlay")

  sidebar.classList.toggle("open")
  overlay.classList.toggle("show")

  document.body.classList.toggle("menu-open")
}

function closeSidebar(){

  document.getElementById("sidebar").classList.remove("open")
  document.getElementById("overlay").classList.remove("show")

  document.body.classList.remove("menu-open")
}

/* ESC CLOSE */

document.addEventListener("keydown",function(e){

  if(e.key === "Escape"){
    closeSidebar()
  }

})

/* DATE + TIME */

function updateDateTime(){

  const now = new Date(
    new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"})
  )

  document.getElementById("live-date").textContent =
    now.toLocaleDateString("en-GB",{
      day:"2-digit",
      month:"short",
      year:"numeric"
    })

  document.getElementById("live-time").textContent =
    now.toLocaleTimeString("en-IN",{
      hour:"2-digit",
      minute:"2-digit",
      second:"2-digit"
    }) + " IST"
}

updateDateTime()
setInterval(updateDateTime,1000)

/* FEATHER ICONS */

feather.replace()

</script>
