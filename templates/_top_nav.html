<meta name="csrf-token" content="{{ csrf_token() }}">

<link rel="stylesheet" href="/static/components.css">

<style>
/* ═══════════════════════════════════════════════════════════
   TOP NAV / SIDEBAR — grouped, mobile-friendly
   ═══════════════════════════════════════════════════════════ */

/* ── Top header bar ── */
.top-context{
  width:100%;
  padding:10px 18px;
  display:flex;
  align-items:center;
  gap:16px;
  background:#ffffff;
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
  z-index:900;
}
html.dark .top-context{background:#1e293b;border-bottom-color:#334155;}

.hamburger{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:18px;
  cursor:pointer;
  border:1px solid transparent;
  background:none;
  color:#111827;
  font-weight:600;
  padding:8px 12px;
  border-radius:8px;
  min-height:40px;
  transition:all .15s;
}
.hamburger:hover{background:#f3f4f6;border-color:#e5e7eb;}
html.dark .hamburger{color:#f1f5f9;}
html.dark .hamburger:hover{background:#334155;border-color:#475569;}

.date-row{
  border-left:1px solid #e5e7eb;
  padding-left:12px;
  display:flex;
  gap:10px;
  align-items:center;
  font-size:14px;
  color:#374151;
  flex-wrap:wrap;
}
html.dark .date-row{border-left-color:#334155;color:#cbd5e1;}
.date-row .time{font-weight:600;color:#2563eb;}

/* ── Sidebar drawer ── */
.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:288px;
  height:100%;
  background:#ffffff;
  box-shadow:4px 0 28px rgba(0,0,0,.18);
  padding:18px 14px calc(24px + env(safe-area-inset-bottom,0));
  transform:translateX(-100%);
  transition:transform .25s ease;
  z-index:1100;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:flex;
  flex-direction:column;
}
html.dark .sidebar{background:#1e293b;box-shadow:4px 0 28px rgba(0,0,0,.45);}
.sidebar.open{transform:translateX(0);}
body.menu-open{overflow:hidden;}

.sidebar-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 6px 14px;
  border-bottom:1px solid #f1f3f5;
  margin-bottom:10px;
}
html.dark .sidebar-header{border-bottom-color:#334155;}
.sidebar-title{
  font-size:17px;
  font-weight:800;
  color:#111827;
  letter-spacing:-0.3px;
}
html.dark .sidebar-title{color:#f1f5f9;}
.sidebar-close{
  width:36px;
  height:36px;
  border:none;
  background:none;
  border-radius:8px;
  cursor:pointer;
  color:#6b7280;
  display:none;
  align-items:center;
  justify-content:center;
}
.sidebar-close:hover{background:#f3f4f6;color:#111827;}
html.dark .sidebar-close{color:#94a3b8;}
html.dark .sidebar-close:hover{background:#334155;color:#f1f5f9;}

/* ── Nav groups ── */
.sidebar-nav{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
}
.nav-group{
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-bottom:10px;
}
.nav-group-title{
  font-size:10px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#9ca3af;
  padding:6px 10px 4px;
}
html.dark .nav-group-title{color:#64748b;}
.nav-footer{margin-top:auto;padding-top:10px;border-top:1px solid #f1f3f5;}
html.dark .nav-footer{border-top-color:#334155;}

.sidebar-nav a{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:#374151;
  font-size:14px;
  font-weight:500;
  padding:10px 12px;
  border-radius:9px;
  min-height:42px;
  transition:background .12s,color .12s;
}
.sidebar-nav a:hover{background:#f3f4f6;color:#111827;}
html.dark .sidebar-nav a{color:#cbd5e1;}
html.dark .sidebar-nav a:hover{background:#334155;color:#f1f5f9;}
.sidebar-nav svg{width:18px;height:18px;flex-shrink:0;}

.sidebar-nav a.active{
  background:#eff6ff;
  color:#2563eb;
  font-weight:700;
}
.sidebar-nav a.active svg{stroke:#2563eb;}
html.dark .sidebar-nav a.active{background:#172554;color:#60a5fa;}
html.dark .sidebar-nav a.active svg{stroke:#60a5fa;}

/* ── Overlay ── */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(3px);
  opacity:0;
  pointer-events:none;
  transition:opacity .2s ease;
  z-index:1050;
}
.overlay.show{opacity:1;pointer-events:auto;}

/* ── Section title under header (contextual page title) ── */
.section-title{
  font-size:15px;
  font-weight:600;
  color:#111827;
  margin-top:6px;
}
html.dark .section-title{color:#f1f5f9;}

/* ── Legacy planner toggle kept for pages that use it ── */
.planner-toggle{
  display:flex;
  gap:6px;
  margin-bottom:14px;
  background:#eef2f7;
  padding:4px;
  border-radius:10px;
  width:fit-content;
}
.toggle-btn{
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  padding:6px 10px;
  border-radius:8px;
  color:#6b7280;
}
.toggle-btn.active{
  background:#ffffff;
  color:#2563eb;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* ═══ MOBILE ═══ */
@media (max-width:768px){
  .top-context{padding:10px 14px;gap:10px;}
  .hamburger{font-size:17px;padding:9px 13px;}
  .date-row{
    font-size:13px;
    padding-left:10px;
    gap:8px;
  }
  .date-row .time{font-size:13px;}

  .sidebar{
    width:min(92vw,340px);
    padding:16px 12px calc(24px + env(safe-area-inset-bottom,0));
  }
  .sidebar-close{display:flex;}
  .sidebar-title{font-size:18px;}

  .nav-group-title{
    font-size:11px;
    padding:10px 12px 6px;
  }
  .sidebar-nav a{
    font-size:15px;
    padding:13px 14px;
    min-height:48px;
    border-radius:11px;
    gap:14px;
  }
  .sidebar-nav svg{width:20px;height:20px;}
}

/* ═══ VERY NARROW PHONES ═══ */
@media (max-width:380px){
  .top-context{padding:8px 10px;gap:8px;}
  .hamburger span{display:none;}
  .date-row{font-size:12px;padding-left:8px;}
}
</style>

<script>

/* SIDEBAR CONTROL */

function toggleSidebar(){

  const sidebar = document.getElementById("sidebar")
  const overlay = document.getElementById("overlay")

  sidebar.classList.toggle("open")
  overlay.classList.toggle("show")

  document.body.classList.toggle("menu-open")
}

function closeSidebar(){

  document.getElementById("sidebar").classList.remove("open")
  document.getElementById("overlay").classList.remove("show")

  document.body.classList.remove("menu-open")
}

/* ESC CLOSE */

document.addEventListener("keydown",function(e){

  if(e.key === "Escape"){
    closeSidebar()
  }

})

/* DATE + TIME */

function updateDateTime(){

  const now = new Date(
    new Date().toLocaleString("en-US",{timeZone:"Asia/Kolkata"})
  )

  document.getElementById("live-date").textContent =
    now.toLocaleDateString("en-GB",{
      day:"2-digit",
      month:"short",
      year:"numeric"
    })

  document.getElementById("live-time").textContent =
    now.toLocaleTimeString("en-IN",{
      hour:"2-digit",
      minute:"2-digit",
      second:"2-digit"
    }) + " IST"
}

updateDateTime()
setInterval(updateDateTime,1000)

/* ACTIVE-LINK HIGHLIGHT — match current URL against each nav link's
   data-match regex (or fall back to exact href match). */
(function highlightActiveNav(){
  const path = window.location.pathname + window.location.search;
  const links = document.querySelectorAll('.sidebar-nav a[href]');
  let bestMatch = null;
  let bestLen = -1;

  links.forEach(a => {
    const pattern = a.getAttribute('data-match');
    let matched = false;
    if (pattern) {
      try {
        if (new RegExp(pattern).test(path)) matched = true;
      } catch {}
    } else {
      const href = a.getAttribute('href');
      if (href && href !== '#' && href !== 'javascript:void(0)' && path.startsWith(href)) {
        matched = true;
      }
    }
    if (matched) {
      const len = (pattern || a.getAttribute('href') || '').length;
      if (len > bestLen) { bestLen = len; bestMatch = a; }
    }
  });

  if (bestMatch) bestMatch.classList.add('active');
})();

/* FEATHER ICONS */

feather.replace()

</script>
