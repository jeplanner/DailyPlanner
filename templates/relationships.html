{% extends "base.html" %}

{% block title %}Relationships{% endblock %}

{% block content %}
<div class="rel-page">
  <header class="rel-header">
    <h1>Relationships</h1>
    <p class="rel-sub">When did you last reach out to the people who matter? Set a cadence; the page nudges you when you're overdue.</p>
  </header>

  <form class="rel-add" onsubmit="addRelationship(event)">
    <input type="text" id="rel-name" placeholder="Name (e.g. Mom)" required maxlength="80">
    <input type="text" id="rel-relation" placeholder="Relation (family, friend, mentor…)" maxlength="40">
    <input type="number" id="rel-cadence" placeholder="Every (days)" value="14" min="1" max="365">
    <input type="date" id="rel-last">
    <button type="submit" class="rel-btn rel-btn-primary">Add</button>
  </form>

  <div id="rel-list" class="rel-list">
    <div class="rel-loading">Loading…</div>
  </div>
</div>

<style>
  .rel-page { max-width: 880px; margin: 24px auto; padding: 0 18px; }
  .rel-header h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .rel-sub { color: var(--color-text-secondary, #64748b); font-size: 14px; margin-bottom: 24px; }
  .rel-add {
    display: grid;
    grid-template-columns: 1fr 1fr 120px 160px auto;
    gap: 8px;
    margin-bottom: 24px;
    padding: 14px;
    background: var(--color-bg-subtle, #f8fafc);
    border-radius: 12px;
    border: 1px solid var(--color-border, #e2e8f0);
  }
  @media (max-width: 720px) { .rel-add { grid-template-columns: 1fr 1fr; } }
  .rel-add input {
    padding: 8px 12px; font: inherit; font-size: 14px;
    border: 1px solid var(--color-border, #e2e8f0);
    border-radius: 8px;
    background: var(--color-bg, #fff);
    color: var(--color-text, #0f172a);
  }
  .rel-btn {
    padding: 8px 16px; font: inherit; font-size: 14px; font-weight: 600;
    border: none; border-radius: 8px; cursor: pointer;
  }
  .rel-btn-primary { background: var(--color-primary, #2563eb); color: #fff; }
  .rel-list { display: flex; flex-direction: column; gap: 8px; }
  .rel-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px; align-items: center;
    padding: 14px 16px;
    background: var(--color-bg, #fff);
    border: 1px solid var(--color-border, #e2e8f0);
    border-radius: 10px;
  }
  .rel-row.is-overdue { border-left: 4px solid #dc2626; }
  .rel-name { font-weight: 600; font-size: 15px; }
  .rel-relation {
    font-size: 12px; color: var(--color-text-secondary, #64748b);
    margin-left: 8px; font-weight: 500;
  }
  .rel-status {
    font-size: 12px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }
  .rel-status.is-ok    { background: color-mix(in srgb, #16a34a 14%, transparent); color: #15803d; }
  .rel-status.is-due   { background: color-mix(in srgb, #f59e0b 16%, transparent); color: #b45309; }
  .rel-status.is-late  { background: color-mix(in srgb, #dc2626 14%, transparent); color: #b91c1c; }
  html.dark .rel-status.is-ok    { background: #052e16; color: #86efac; }
  html.dark .rel-status.is-due   { background: #451a03; color: #fcd34d; }
  html.dark .rel-status.is-late  { background: #3b1111; color: #fca5a5; }
  .rel-touch {
    appearance: none; padding: 6px 12px;
    font: inherit; font-size: 12px; font-weight: 600;
    background: var(--color-primary, #2563eb); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
  }
  .rel-archive {
    appearance: none; padding: 6px 8px;
    background: transparent; border: none; cursor: pointer;
    color: var(--color-text-tertiary, #94a3b8);
  }
  .rel-archive:hover { color: #dc2626; }
  .rel-loading, .rel-empty {
    padding: 24px; text-align: center;
    color: var(--color-text-secondary, #64748b);
  }
</style>

<script>
  async function loadRelationships() {
    const r = await fetch("/api/relationships");
    const data = await r.json();
    _renderRelList(data.relationships || []);
  }

  function _renderRelList(items) {
    const root = document.getElementById("rel-list");
    if (!items.length) {
      root.innerHTML = '<div class="rel-empty">No relationships yet. Add the first person above.</div>';
      return;
    }
    root.innerHTML = items.map(it => {
      const overdue = it.overdue_by || 0;
      const days_since = it.days_since;
      let statusClass = "is-ok", statusText = "On track";
      if (days_since == null) {
        statusClass = "is-due"; statusText = "Never contacted";
      } else if (overdue > 7) {
        statusClass = "is-late"; statusText = `${overdue}d overdue`;
      } else if (overdue > 0) {
        statusClass = "is-due"; statusText = `${overdue}d overdue`;
      } else {
        statusText = `${days_since}d ago · ${it.cadence_days}d cadence`;
      }
      return `
        <div class="rel-row ${overdue > 0 ? 'is-overdue' : ''}">
          <div>
            <span class="rel-name">${_escRel(it.name)}</span>
            ${it.relation ? `<span class="rel-relation">${_escRel(it.relation)}</span>` : ''}
          </div>
          <span class="rel-status ${statusClass}">${statusText}</span>
          <button class="rel-touch" onclick="touchRelationship('${it.id}')">Just reached out</button>
          <button class="rel-archive" title="Archive" onclick="archiveRelationship('${it.id}')">×</button>
        </div>`;
    }).join("");
  }
  function _escRel(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function addRelationship(ev) {
    ev.preventDefault();
    const payload = {
      name: document.getElementById("rel-name").value.trim(),
      relation: document.getElementById("rel-relation").value.trim(),
      cadence_days: parseInt(document.getElementById("rel-cadence").value, 10) || 14,
      last_contact_date: document.getElementById("rel-last").value || null,
    };
    const r = await fetch("/api/relationships", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (r.ok) {
      ev.target.reset();
      document.getElementById("rel-cadence").value = 14;
      loadRelationships();
    } else {
      if (window.showToast) showToast("Couldn't save", "error");
    }
  }
  async function touchRelationship(id) {
    await fetch(`/api/relationships/${id}/touch`, { method: "POST" });
    loadRelationships();
    if (window.showToast) showToast("Logged contact", "success", 1500);
  }
  async function archiveRelationship(id) {
    await fetch(`/api/relationships/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ is_archived: true }),
    });
    loadRelationships();
  }
  document.addEventListener("DOMContentLoaded", loadRelationships);
</script>
{% endblock %}
