<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='references.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="{{ url_for('static', filename='js/global.js') }}"></script>
  <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>

<div class="nav-icons">{% include "_top_nav.html" %}</div>

<div class="kb-app">

  <!-- ═══════════════════════ HEADER ═══════════════════════ -->
  <header class="kb-header">
    <div>
      <h1 class="kb-title">Knowledge Base</h1>
      <p class="kb-sub" id="resultCount">Loading…</p>
    </div>
    <button class="kb-add-btn" onclick="openAddModal()" title="Add a new entry (N)">
      <i data-feather="plus"></i>
      <span>Add Entry</span>
    </button>
  </header>

  <!-- ═══════════════════ ASK KNOWLEDGE BASE ═══════════════════
       Compact hero input instead of the old thick bordered card.
       Results expand in place when a question is submitted. -->
  <div class="kb-ask">
    <div class="kb-ask-bar">
      <i data-feather="message-circle" class="kb-ask-icon"></i>
      <input type="text" id="ask-input"
             placeholder="Ask your knowledge base — e.g. 'How does compound interest work?'">
      <button id="ask-btn" class="kb-ask-btn">
        <span>Ask</span>
        <i data-feather="arrow-right"></i>
      </button>
    </div>
    <div id="ask-result" class="kb-ask-result" style="display:none;">
      <div id="ask-answer" class="kb-ask-answer"></div>
      <div id="ask-sources" class="kb-ask-sources"></div>
    </div>
  </div>

  <!-- ═══════════════════ MAIN LAYOUT ═══════════════════ -->
  <div class="kb-layout">

    <!-- Sidebar: facets (categories + tags) -->
    <aside class="kb-sidebar">
      <div class="kb-facet">
        <div class="kb-facet-title">
          <i data-feather="folder"></i> Categories
        </div>
        <div class="kb-facet-list" id="categoryFacets">
          <button class="kb-facet-item active" data-cat="">
            <span>All</span>
            <span class="kb-facet-count" id="count-all">—</span>
          </button>
          {% for cat in categories %}
          <button class="kb-facet-item" data-cat="{{ cat }}">
            <span class="kb-facet-dot" style="background: var(--kb-cat-{{ cat|replace(' ', '-')|replace('/', '-')|lower }}, #6b7280);"></span>
            <span class="kb-facet-label">{{ cat }}</span>
          </button>
          {% endfor %}
        </div>
      </div>

      <div class="kb-facet">
        <div class="kb-facet-title">
          <i data-feather="tag"></i> Top Tags
        </div>
        <div class="kb-tag-cloud" id="tagCloud">
          <div class="kb-facet-empty">Loading tags…</div>
        </div>
      </div>

      <div class="kb-facet">
        <div class="kb-facet-title">
          <i data-feather="sliders"></i> Sort
        </div>
        <select id="sortSelect" class="kb-sort-select">
          <option value="created_at_desc">Newest first</option>
          <option value="created_at_asc">Oldest first</option>
          <option value="title_asc">Title A–Z</option>
        </select>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="kb-main">

      <!-- Search + view toggle -->
      <div class="kb-search-row">
        <div class="kb-search">
          <i data-feather="search" class="kb-search-icon"></i>
          <input type="text" id="searchInput" placeholder="Search titles, descriptions and tags…" autocomplete="off">
          <button id="searchClearBtn" class="kb-search-clear" title="Clear" style="display:none;">
            <i data-feather="x"></i>
          </button>
        </div>
        <div class="kb-view-toggle">
          <button class="kb-vt-btn active" data-view="grid" onclick="setKbView('grid')" title="Grid view">
            <i data-feather="grid"></i>
          </button>
          <button class="kb-vt-btn" data-view="list" onclick="setKbView('list')" title="List view">
            <i data-feather="list"></i>
          </button>
        </div>
      </div>

      <!-- Active filter chips (shown only when filters applied) -->
      <div class="kb-active-filters" id="activeFilters" style="display:none;"></div>

      <!-- Results container — cards flow into .reference-list for JS compat -->
      <div id="referenceList" class="reference-list kb-grid"></div>

    </main>
  </div>
</div>

<!-- ═══════════════════════ ADD MODAL ═══════════════════════ -->
<div id="add-modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box kb-add-modal">

    <div class="modal-header">
      <div>
        <div class="modal-eyebrow">Knowledge Base</div>
        <h3>Add Entry</h3>
      </div>
      <button class="modal-close" onclick="closeAddModal()" title="Close">
        <i data-feather="x"></i>
      </button>
    </div>

    <!-- Tab switcher -->
    <div class="kb-add-tabs">
      <button class="kb-add-tab active" data-tab="ai" onclick="switchAddTab('ai')">
        <i data-feather="cpu"></i> AI Generate
      </button>
      <button class="kb-add-tab" data-tab="url" onclick="switchAddTab('url')">
        <i data-feather="link"></i> From URL
      </button>
      <button class="kb-add-tab" data-tab="manual" onclick="switchAddTab('manual')">
        <i data-feather="edit-3"></i> Manual
      </button>
    </div>

    <!-- AI Generate tab -->
    <div class="kb-add-panel active" data-panel="ai">
      <div class="ai-assist-card">
        <label class="kb-field-label">Mode</label>
        <select id="ai-mode" class="kb-field">
          <option value="groq">⚡ Groq (fast)</option>
          <option value="gemini">✨ Gemini</option>
          <option value="manual">📝 Manual (paste from ChatGPT)</option>
        </select>

        <label class="kb-field-label">Topic</label>
        <div class="question-input-wrapper">
          <input type="text" id="ai-query" class="kb-field" placeholder="e.g. 'How does RAG work?' or 'Compound interest explained'">
          <button type="button" id="voiceBtn" class="kb-icon-btn" title="Voice input">
            <i data-feather="mic"></i>
          </button>
        </div>

        <div class="ai-buttons">
          <button id="ai-primary-btn" class="kb-btn kb-btn-primary">
            <i data-feather="zap"></i> Generate
          </button>
        </div>
        <div id="ai-preview"></div>
      </div>
    </div>

    <!-- URL tab -->
    <div class="kb-add-panel" data-panel="url">
      <div id="fetch-status" class="fetch-status" style="display:none;">
        <span class="fetch-spinner"></span>
        <span id="fetch-status-text">Fetching details…</span>
      </div>

      <label class="kb-field-label">URL</label>
      <input type="url" id="ref-url" class="kb-field" placeholder="https://example.com">

      <label class="kb-toggle">
        <input type="checkbox" id="enable-ai" checked>
        <span>Auto-fetch title, description &amp; tags from URL</span>
      </label>
    </div>

    <!-- Manual tab (also used after URL/AI fetch completes) -->
    <div class="kb-add-panel" data-panel="manual">
      <label class="kb-field-label">Title</label>
      <input type="text" id="ref-title" class="kb-field" placeholder="Entry title">

      <label class="kb-field-label">Description</label>
      <textarea id="ref-description" class="kb-field" rows="5" placeholder="What's this entry about? Auto-filled when using URL or AI generate."></textarea>

      <label class="kb-field-label">Tags</label>
      <input type="text" id="ref-tags" class="kb-field" placeholder="comma, separated, tags">

      <label class="kb-field-label">Category</label>
      <div class="category-row">
        <select id="ref-category" class="kb-field">
          <option value="">Pick a category</option>
          {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
        <input type="text" id="new-category" class="kb-field" placeholder="…or type a new one">
      </div>
    </div>

    <div class="kb-add-footer">
      <button class="kb-btn kb-btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button type="button" id="saveRefBtn" class="kb-btn kb-btn-primary">
        <i data-feather="check"></i> Save Entry
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ STUDY MODAL ═══════════════════════ -->
<div id="study-modal-overlay" class="modal-overlay" onclick="handleStudyOverlayClick(event)">
  <div class="modal-box study-modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-eyebrow">Study Notes</div>
        <h3 id="study-title-row">Loading…</h3>
      </div>
      <button class="modal-close" onclick="closeStudyModal()" title="Close">
        <i data-feather="x"></i>
      </button>
    </div>
    <div id="study-loading" class="study-loading" style="display:none;">
      <span class="fetch-spinner"></span>
      <span>Generating study notes…</span>
    </div>
    <div id="study-notes" class="study-notes"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="{{ url_for('static', filename='references.js') }}" defer></script>
<script src="{{ url_for('static', filename='js/ai_assist.js') }}" defer></script>

<script>
// ─── Modal + tab handling ─────────────────────────────────
function openAddModal() {
  document.getElementById("add-modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
  setTimeout(() => document.getElementById("ai-query")?.focus(), 100);
}
function closeAddModal() {
  document.getElementById("add-modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById("add-modal-overlay")) closeAddModal();
}
function closeStudyModal() {
  document.getElementById("study-modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}
function handleStudyOverlayClick(e) {
  if (e.target === document.getElementById("study-modal-overlay")) closeStudyModal();
}

function switchAddTab(tab) {
  document.querySelectorAll(".kb-add-tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === tab));
  document.querySelectorAll(".kb-add-panel").forEach(p =>
    p.classList.toggle("active", p.dataset.panel === tab));
  // Auto-focus the primary input of the active panel
  setTimeout(() => {
    if (tab === "ai") document.getElementById("ai-query")?.focus();
    if (tab === "url") document.getElementById("ref-url")?.focus();
    if (tab === "manual") document.getElementById("ref-title")?.focus();
  }, 60);
}

// Grid / list view toggle for the card container
function setKbView(view) {
  const list = document.getElementById("referenceList");
  if (!list) return;
  list.classList.toggle("kb-grid", view === "grid");
  list.classList.toggle("kb-list", view === "list");
  document.querySelectorAll(".kb-vt-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));
  try { localStorage.setItem("kb_view", view); } catch {}
}

// Restore the saved view on load
(function restoreKbView() {
  try {
    const saved = localStorage.getItem("kb_view");
    if (saved && saved !== "grid") {
      document.addEventListener("DOMContentLoaded", () => setKbView(saved), { once: true });
    }
  } catch {}
})();

// Category facet clicks drive the hidden category filter
document.addEventListener("DOMContentLoaded", () => {
  if (window.feather) feather.replace();

  const catSelect = document.createElement("select");
  catSelect.id = "categoryFilter";
  catSelect.style.display = "none";
  document.body.appendChild(catSelect);
  const blank = document.createElement("option");
  blank.value = "";
  catSelect.appendChild(blank);

  document.querySelectorAll(".kb-facet-item").forEach(btn => {
    const cat = btn.dataset.cat;
    if (cat) {
      const opt = document.createElement("option");
      opt.value = cat;
      catSelect.appendChild(opt);
    }
    btn.addEventListener("click", () => {
      document.querySelectorAll(".kb-facet-item").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      catSelect.value = cat || "";
      catSelect.dispatchEvent(new Event("change"));
    });
  });

  // Search clear button
  const searchInput = document.getElementById("searchInput");
  const clearBtn = document.getElementById("searchClearBtn");
  if (searchInput && clearBtn) {
    searchInput.addEventListener("input", () => {
      clearBtn.style.display = searchInput.value ? "flex" : "none";
    });
    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearBtn.style.display = "none";
      searchInput.dispatchEvent(new Event("input"));
      searchInput.focus();
    });
  }
});

// Keyboard: N for new entry, / to focus search, Esc to close
document.addEventListener("keydown", e => {
  const tag = (e.target.tagName || "").toLowerCase();
  const typing = tag === "input" || tag === "textarea";
  if (e.key === "Escape") {
    closeAddModal();
    closeStudyModal();
    return;
  }
  if (typing || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "n" || e.key === "N") {
    e.preventDefault();
    openAddModal();
  }
  if (e.key === "/") {
    e.preventDefault();
    document.getElementById("searchInput")?.focus();
  }
});
</script>
</body>
</html>
