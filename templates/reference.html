<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>References</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='references.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>

{% include "_top_nav.html" %}

<div class="reference-container">

  <!-- ═══════════════════════════════════════════════
       1. ASK MY REFERENCES
  ════════════════════════════════════════════════ -->
  <div class="ask-card">
    <div class="ask-header">
      <span>💬 Ask My References</span>
      <small>AI answers from your saved knowledge base</small>
    </div>
    <div class="ask-input-row">
      <input type="text" id="ask-input"
             placeholder="e.g. What is RAG in AI? How does compound interest work?" />
      <button id="ask-btn">Ask</button>
    </div>
    <div id="ask-result" style="display:none;">
      <div id="ask-answer" class="ask-answer"></div>
      <div id="ask-sources" class="ask-sources"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       2. FILTER BAR  +  ADD BUTTON
  ════════════════════════════════════════════════ -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Search references…">
    <select id="categoryFilter">
      <option value="">All Categories</option>
      {% for cat in categories %}
        <option value="{{ cat }}">{{ cat }}</option>
      {% endfor %}
    </select>
    <select id="sortSelect">
      <option value="created_at_desc">Newest first</option>
      <option value="created_at_asc">Oldest first</option>
      <option value="title_asc">Title A–Z</option>
    </select>
    <button id="resetFilterBtn" class="btn-outline">Clear</button>
    <button id="tagCloudToggle" class="btn-outline">🏷 Tags</button>
    <button class="btn-add-toggle" onclick="openAddModal()">＋ Add</button>
  </div>

  <!-- Tag cloud (collapsed by default) -->
  <div id="tagCloud" class="tag-cloud tag-cloud-hidden"></div>

  <!-- Result count -->
  <div id="resultCount" class="result-count"></div>

  <!-- ═══════════════════════════════════════════════
       3. REFERENCE LIST
  ════════════════════════════════════════════════ -->
  <div id="referenceList" class="reference-list"></div>

</div>

<!-- ═══════════════════════════════════════════════
     ADD REFERENCE MODAL
════════════════════════════════════════════════ -->
<div id="add-modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal-box">

    <div class="modal-header">
      <span>＋ Add Reference</span>
      <button class="modal-close" onclick="closeAddModal()" title="Close">✕</button>
    </div>

    <!-- Status bar shown while fetching -->
    <div id="fetch-status" class="fetch-status" style="display:none;">
      <span class="fetch-spinner"></span>
      <span id="fetch-status-text">Fetching details…</span>
    </div>

    <!-- AI Generate section -->
    <div class="modal-section">
      <div class="ai-assist-card">
        <div class="ai-header">
          <h3>🤖 AI Generate</h3>
          <select id="ai-mode">
            <option value="groq">Groq (Fast)</option>
            <option value="gemini">Gemini</option>
            <option value="manual">Manual (ChatGPT)</option>
          </select>
        </div>
        <div class="question-input-wrapper">
          <input type="text" id="ai-query" placeholder="Type a topic to generate a reference…" />
          <button type="button" id="voiceBtn" title="Voice input">🎙</button>
        </div>
        <div class="ai-buttons">
          <button id="ai-primary-btn">Generate</button>
        </div>
        <div id="ai-preview"></div>
      </div>
    </div>

    <div class="modal-divider">or paste a URL below</div>

    <!-- Form -->
    <div class="modal-section">
      <div class="ai-toggle">
        <label class="ai-toggle-label">
          <input type="checkbox" id="enable-ai" checked>
          <span>Auto-fetch title, description &amp; tags from URL</span>
        </label>
      </div>

      <input type="url"  id="ref-url"   placeholder="https://example.com" />
      <input type="text" id="ref-title" placeholder="Title" />
      <textarea id="ref-description" placeholder="Description (auto-filled from URL)" rows="5"></textarea>
      <input type="text" id="ref-tags"  placeholder="Tags (comma separated)" />

      <div class="category-row">
        <select id="ref-category">
          <option value="">Select Category</option>
          {% for cat in categories %}
            <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
        <input type="text" id="new-category" placeholder="Or type a new category" />
      </div>

      <button type="button" id="saveRefBtn" class="btn-save">Save Reference</button>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="{{ url_for('static', filename='references.js') }}" defer></script>
<script src="{{ url_for('static', filename='js/ai_assist.js') }}" defer></script>

<script>
  function openAddModal() {
    document.getElementById("add-modal-overlay").classList.add("open");
    document.body.style.overflow = "hidden";
    setTimeout(() => document.getElementById("ref-url")?.focus(), 100);
  }

  function closeAddModal() {
    document.getElementById("add-modal-overlay").classList.remove("open");
    document.body.style.overflow = "";
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("add-modal-overlay")) closeAddModal();
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeAddModal();
  });
</script>

</body>
</html>
