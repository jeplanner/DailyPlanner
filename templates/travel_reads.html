<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<title>TravelReads — DailyPlanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
<script src="https://unpkg.com/feather-icons"></script>
<script src="{{ url_for('static', filename='js/global.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<style>
  body { background: var(--color-bg); color: var(--color-text); font-family: var(--font-family); margin: 0; }
  .tr-app { max-width: 980px; margin: 0 auto; padding: 24px 20px 80px; }

  /* Hero */
  .tr-hero { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .tr-hero h1 { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -.02em; }
  .tr-sub { color: var(--color-text-secondary); font-size: 13px; margin: 4px 0 0; }

  /* Stats strip */
  .tr-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .tr-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    font-size: 12.5px; color: var(--color-text-secondary);
  }
  .tr-chip strong { color: var(--color-text); font-weight: 800; font-variant-numeric: tabular-nums; }
  .tr-chip.minutes { background: color-mix(in srgb, #2563eb 8%, transparent); border-color: color-mix(in srgb, #2563eb 20%, transparent); }

  /* Add form */
  .tr-add { background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 14px; padding: 16px; margin-bottom: 22px;
    box-shadow: 0 1px 3px rgba(15,23,42,.04); }
  .tr-add-grid {
    display: grid; gap: 10px 12px;
    grid-template-columns: 3fr 1fr 1fr 1fr;
  }
  @media (max-width: 720px) { .tr-add-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .tr-add-grid { grid-template-columns: 1fr; } }
  .tr-add label { display: flex; flex-direction: column; gap: 5px; }
  .tr-lbl { font-size: 11.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--color-text-tertiary, var(--color-text-secondary)); }
  .tr-add input,
  .tr-add select {
    padding: 9px 12px; font: inherit; font-size: 14px;
    border: 1px solid var(--color-border); border-radius: 8px;
    background: var(--color-surface); color: var(--color-text);
    transition: border-color .12s, box-shadow .12s;
  }
  .tr-add input:focus,
  .tr-add select:focus {
    outline: none; border-color: var(--color-primary);
    box-shadow: 0 0 0 3px var(--color-primary-ring, rgba(37,99,235,.15));
  }
  .tr-add-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); transition: background .12s, border-color .12s; }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); }
  .btn-primary:hover { background: var(--color-primary-hover); border-color: var(--color-primary-hover); }
  .btn-ghost:hover { background: var(--color-surface-secondary); }

  /* Sections */
  .tr-section { margin-bottom: 24px; }
  .tr-section-head {
    display: flex; align-items: center; gap: 10px;
    margin: 0 0 10px; padding: 0 4px;
    font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    color: var(--color-text-secondary);
  }
  .tr-section-count { margin-left: auto; font-weight: 600; font-size: 11.5px; color: var(--color-text-muted, var(--color-text-secondary)); letter-spacing: 0; text-transform: none; }

  /* Card */
  .tr-card {
    display: grid;
    grid-template-columns: 132px minmax(0, 1fr) auto;
    gap: 0;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: 14px; overflow: hidden;
    margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
    transition: border-color .12s, transform .08s;
  }
  .tr-card:hover { border-color: color-mix(in srgb, var(--color-primary, #2563eb) 30%, var(--color-border)); }
  .tr-thumb {
    width: 132px; height: 100%; min-height: 88px;
    background: var(--color-bg-subtle, #f1f5f9);
    background-size: cover; background-position: center;
    border-right: 1px solid var(--color-border);
  }
  .tr-thumb-fallback {
    display: flex; align-items: center; justify-content: center;
    color: var(--color-text-muted);
    font-size: 24px;
  }
  .tr-body { padding: 12px 14px; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
  .tr-title-row { display: flex; align-items: flex-start; gap: 8px; }
  .tr-title {
    font-size: 15px; font-weight: 700; color: var(--color-text);
    line-height: 1.3; word-break: break-word;
    flex: 1; min-width: 0;
  }
  .tr-title a { color: inherit; text-decoration: none; }
  .tr-title a:hover { color: var(--color-primary); }
  .tr-meta {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    font-size: 11.5px; color: var(--color-text-secondary);
  }
  .tr-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 1px 7px; border-radius: 999px; font-weight: 700;
    background: var(--color-bg-subtle, #f1f5f9); color: var(--color-text-secondary);
    font-size: 10.5px; letter-spacing: .02em; text-transform: uppercase;
  }
  .tr-pill.kind-video    { background: color-mix(in srgb, #dc2626 12%, transparent); color: #b91c1c; }
  .tr-pill.kind-podcast  { background: color-mix(in srgb, #7c3aed 12%, transparent); color: #6d28d9; }
  .tr-pill.kind-audio    { background: color-mix(in srgb, #16a34a 12%, transparent); color: #166534; }
  .tr-pill.kind-article  { background: color-mix(in srgb, #2563eb 12%, transparent); color: #1d4ed8; }
  .tr-pill.kind-other    { background: color-mix(in srgb, #6b7280 14%, transparent); color: #4b5563; }
  .tr-pill.prio-high     { background: color-mix(in srgb, #f59e0b 16%, transparent); color: #92400e; }
  .tr-pill.prio-low      { background: color-mix(in srgb, #6b7280 12%, transparent); color: #4b5563; }
  .tr-source { color: var(--color-text-muted); font-weight: 500; }
  .tr-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.45; }
  .tr-desc.is-clamped {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tr-actions {
    display: flex; flex-direction: column; gap: 6px;
    padding: 12px; border-left: 1px solid var(--color-border);
    background: var(--color-bg-subtle, transparent);
  }
  .tr-icon-btn {
    appearance: none; width: 34px; height: 34px;
    padding: 0; border: 1px solid var(--color-border); background: var(--color-surface);
    border-radius: 8px; cursor: pointer;
    color: var(--color-text-secondary);
    display: inline-flex; align-items: center; justify-content: center;
    transition: background .12s, color .12s, border-color .12s;
  }
  .tr-icon-btn svg { width: 15px; height: 15px; }
  .tr-icon-btn:hover { background: var(--color-surface-secondary); color: var(--color-primary); border-color: var(--color-primary); }
  .tr-icon-btn.danger:hover { color: #b91c1c; border-color: #b91c1c; }
  .tr-icon-btn.success { color: #16a34a; border-color: color-mix(in srgb, #16a34a 30%, var(--color-border)); }
  .tr-card.is-done { opacity: .6; }
  .tr-card.is-done .tr-title { text-decoration: line-through; color: var(--color-text-muted); }

  /* Empty */
  .tr-empty {
    text-align: center;
    background: var(--color-surface); border: 1px dashed var(--color-border);
    border-radius: 14px; padding: 36px 20px;
    color: var(--color-text-secondary); font-size: 14px;
  }
  .tr-empty strong { display: block; font-size: 16px; color: var(--color-text); font-weight: 700; margin-bottom: 4px; }

  /* Mobile */
  @media (max-width: 640px) {
    .tr-app { padding: 16px 14px 80px; }
    .tr-card { grid-template-columns: 96px minmax(0,1fr); grid-template-rows: auto auto; }
    .tr-thumb { width: 96px; height: 100%; }
    .tr-actions { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; border-left: none; border-top: 1px solid var(--color-border); padding: 8px 12px; }
  }
</style>
</head>
<body>

<div class="nav-icons">{% include "_top_nav.html" %}</div>

<div class="tr-app">

  <header class="tr-hero">
    <div>
      <h1>TravelReads</h1>
      <p class="tr-sub">Things to read, watch, and listen to on the road. Add a URL — we'll fetch the title.</p>
    </div>
  </header>

  <div class="tr-stats" id="tr-stats">
    <span class="tr-chip"><strong id="tr-stat-queued">0</strong> queued</span>
    <span class="tr-chip"><strong id="tr-stat-progress">0</strong> in progress</span>
    <span class="tr-chip"><strong id="tr-stat-done">0</strong> done</span>
    <span class="tr-chip minutes"><strong id="tr-stat-minutes">0</strong> min in queue</span>
  </div>

  <form class="tr-add" id="tr-add-form" onsubmit="trAdd(event)">
    <div class="tr-add-grid">
      <label>
        <span class="tr-lbl">URL</span>
        <input type="url" name="url" id="tr-url"
               placeholder="https://…" autocomplete="off" required>
      </label>
      <label>
        <span class="tr-lbl">Type</span>
        <select id="tr-kind">
          <option value="article">Article</option>
          <option value="video">Video</option>
          <option value="podcast">Podcast</option>
          <option value="audio">Audio</option>
          <option value="other">Other</option>
        </select>
      </label>
      <label>
        <span class="tr-lbl">Minutes</span>
        <input type="number" id="tr-minutes" min="0" max="600" placeholder="20" inputmode="numeric">
      </label>
      <label>
        <span class="tr-lbl">Priority</span>
        <select id="tr-priority">
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </label>
    </div>
    <div class="tr-add-actions">
      <button type="submit" class="btn btn-primary"><i data-feather="plus"></i> Add to queue</button>
    </div>
  </form>

  <div id="tr-list-root">
    <div class="tr-empty" id="tr-loading">Loading…</div>
  </div>
</div>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]').content;
let _items = [];
let _stats = {};

const KIND_ICON = {
  article: 'file-text',
  video:   'play-circle',
  podcast: 'headphones',
  audio:   'volume-2',
  other:   'link',
};

async function trLoad() {
  try {
    const r = await fetch('/api/travel-reads', { credentials: 'same-origin' });
    const j = await r.json();
    _items = j.items || [];
    _stats = j.stats || {};
  } catch (e) {
    _items = []; _stats = {};
  }
  trRender();
}

function trRender() {
  const root = document.getElementById('tr-list-root');
  if (!_items.length) {
    root.innerHTML = `
      <div class="tr-empty">
        <strong>Your queue is empty.</strong>
        Paste a URL above to start filling it.
      </div>`;
    _updateStats();
    if (window.feather) feather.replace();
    return;
  }
  const groups = { in_progress: [], queued: [], done: [] };
  _items.forEach(it => {
    const s = it.status || 'queued';
    if (groups[s]) groups[s].push(it);
  });

  const sections = [
    { key: 'in_progress', label: 'In progress', icon: 'play' },
    { key: 'queued',      label: 'Up next',     icon: 'list' },
    { key: 'done',        label: 'Done',        icon: 'check-circle' },
  ];

  let html = '';
  for (const sec of sections) {
    const arr = groups[sec.key];
    if (!arr.length) continue;
    html += `<section class="tr-section">
      <h2 class="tr-section-head">
        <i data-feather="${sec.icon}" style="width:14px;height:14px"></i>
        ${sec.label}
        <span class="tr-section-count">${arr.length}</span>
      </h2>
      ${arr.map(_card).join('')}
    </section>`;
  }
  root.innerHTML = html;
  if (window.feather) feather.replace();
  _updateStats();
}

function _card(it) {
  const isDone = it.status === 'done';
  const isProg = it.status === 'in_progress';
  const thumb = it.thumbnail_url
    ? `<div class="tr-thumb" style="background-image:url('${escapeAttr(it.thumbnail_url)}')"></div>`
    : `<div class="tr-thumb tr-thumb-fallback"><i data-feather="${KIND_ICON[it.kind] || 'link'}"></i></div>`;
  const meta = [
    `<span class="tr-pill kind-${escapeAttr(it.kind || 'article')}">${escapeHtml(it.kind || 'article')}</span>`,
  ];
  if (it.priority === 'high') meta.push(`<span class="tr-pill prio-high">High</span>`);
  if (it.priority === 'low')  meta.push(`<span class="tr-pill prio-low">Low</span>`);
  if (it.duration_minutes)    meta.push(`<span>· ${escapeHtml(String(it.duration_minutes))} min</span>`);
  if (it.source)              meta.push(`<span class="tr-source">· ${escapeHtml(it.source)}</span>`);

  const transcribeLabel = it.transcript_note_id ? 'View transcript' : 'Transcribe (YouTube)';
  const transcribeIcon  = it.transcript_note_id ? 'file-text' : 'mic';
  const transcribeAction = it.transcript_note_id
    ? `onclick="window.open('/notes/scribble/${it.transcript_note_id}', '_blank')"`
    : `onclick="trTranscribe('${it.id}', this)"`;

  const statusBtn = isDone
    ? `<button type="button" class="tr-icon-btn" title="Mark queued again" onclick="trStatus('${it.id}','queued')"><i data-feather="rotate-ccw"></i></button>`
    : isProg
      ? `<button type="button" class="tr-icon-btn success" title="Mark done" onclick="trStatus('${it.id}','done')"><i data-feather="check"></i></button>`
      : `<button type="button" class="tr-icon-btn" title="Start" onclick="trStatus('${it.id}','in_progress')"><i data-feather="play"></i></button>`;

  return `
    <div class="tr-card ${isDone ? 'is-done' : ''}" data-id="${it.id}">
      ${thumb}
      <div class="tr-body">
        <div class="tr-title-row">
          <div class="tr-title"><a href="${escapeAttr(it.url)}" target="_blank" rel="noopener">${escapeHtml(it.title || it.url)}</a></div>
        </div>
        ${it.description ? `<div class="tr-desc is-clamped">${escapeHtml(it.description)}</div>` : ''}
        <div class="tr-meta">${meta.join('')}</div>
      </div>
      <div class="tr-actions">
        <a class="tr-icon-btn" href="${escapeAttr(it.url)}" target="_blank" rel="noopener" title="Open"><i data-feather="external-link"></i></a>
        ${statusBtn}
        <button type="button" class="tr-icon-btn" title="${transcribeLabel}" ${transcribeAction}><i data-feather="${transcribeIcon}"></i></button>
        <button type="button" class="tr-icon-btn danger" title="Remove" onclick="trArchive('${it.id}')"><i data-feather="x"></i></button>
      </div>
    </div>`;
}

function _updateStats() {
  document.getElementById('tr-stat-queued').textContent   = _stats.queued      || 0;
  document.getElementById('tr-stat-progress').textContent = _stats.in_progress || 0;
  document.getElementById('tr-stat-done').textContent     = _stats.done        || 0;
  const mins = _stats.queued_minutes || 0;
  let display;
  if (mins >= 60) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    display = m ? `${h}h ${m}m` : `${h}h`;
  } else {
    display = String(mins);
  }
  document.getElementById('tr-stat-minutes').textContent = display;
}

async function trAdd(ev) {
  ev.preventDefault();
  const url = document.getElementById('tr-url').value.trim();
  if (!url) return;
  const payload = {
    url,
    kind: document.getElementById('tr-kind').value,
    duration_minutes: document.getElementById('tr-minutes').value || null,
    priority: document.getElementById('tr-priority').value,
  };
  try {
    const r = await fetch('/api/travel-reads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      credentials: 'same-origin',
      body: JSON.stringify(payload),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || 'Failed');
    if (j.item) {
      _items.unshift(j.item);
      _stats.queued = (_stats.queued || 0) + 1;
      _stats.queued_minutes = (_stats.queued_minutes || 0) + (parseInt(j.item.duration_minutes, 10) || 0);
    }
    document.getElementById('tr-url').value = '';
    document.getElementById('tr-minutes').value = '';
    trRender();
    document.getElementById('tr-url').focus();
    if (window.showToast) showToast('Added to queue', 'success', 1400);
  } catch (e) {
    if (window.showToast) showToast(e.message || 'Could not add', 'error');
  }
}

async function trStatus(id, status) {
  try {
    const r = await fetch(`/api/travel-reads/${id}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      credentials: 'same-origin',
      body: JSON.stringify({ status }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || 'Failed');
    const it = _items.find(x => x.id === id);
    if (it) it.status = status;
    await trLoad();   // refresh stats too
  } catch (e) {
    if (window.showToast) showToast(e.message || 'Could not update', 'error');
  }
}

async function trArchive(id) {
  if (!confirm('Remove this from your TravelReads queue?')) return;
  try {
    await fetch(`/api/travel-reads/${id}/archive`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      credentials: 'same-origin',
    });
    _items = _items.filter(x => x.id !== id);
    trRender();
    if (window.showToast) showToast('Removed', 'success', 1200);
  } catch (e) {
    if (window.showToast) showToast('Could not remove', 'error');
  }
}

async function trTranscribe(id, btn) {
  if (btn) { btn.disabled = true; btn.style.opacity = .5; }
  try {
    const r = await fetch(`/api/travel-reads/${id}/transcribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      credentials: 'same-origin',
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'Failed');
    if (j.note_id) {
      const it = _items.find(x => x.id === id);
      if (it) it.transcript_note_id = j.note_id;
      trRender();
      if (window.showToast) {
        showToast(
          j.already_transcribed ? 'Transcript already saved' : `Transcript saved (${j.char_count || 0} chars)`,
          'success', 4000,
          { label: 'Open note', onClick: () => window.open(j.note_url || `/notes/scribble/${j.note_id}`, '_blank') }
        );
      }
    }
  } catch (e) {
    if (window.showToast) showToast(e.message || 'Could not transcribe', 'error', 4000);
  } finally {
    if (btn) { btn.disabled = false; btn.style.opacity = 1; }
  }
}

// ─── Helpers ─────────────────────────────────────────
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

document.addEventListener('DOMContentLoaded', () => {
  if (window.feather) feather.replace();
  trLoad();
});
</script>
</body>
</html>
