<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="csrf-token" content="{{ csrf_token() }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='design-system.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='health.css') }}">
<script src="https://unpkg.com/feather-icons"></script>
<script src="{{ url_for('static', filename='js/global.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
</head>
<body>

<div class="nav-icons">{% include "_top_nav.html" %}</div>

<!-- ═══════════ MAIN CONTAINER ═══════════ -->
<div class="habit-app">

  <!-- ── Date Strip ── -->
  <div class="date-strip" id="date-strip"></div>

  <!-- ── Overview Cards ── -->
  <div class="overview-row">
    <div class="overview-card ring-card">
      <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle class="ring-fill" cx="60" cy="60" r="52" id="ring-fill" />
        </svg>
        <div class="ring-label">
          <span class="ring-percent" id="ring-percent">0%</span>
          <span class="ring-sub">Complete</span>
        </div>
      </div>
    </div>

    <div class="overview-card stat-card">
      <div class="stat-icon streak-icon"><i data-feather="zap"></i></div>
      <div class="stat-value" id="streak-value">0</div>
      <div class="stat-label">Day Streak</div>
    </div>

    <div class="overview-card stat-card">
      <div class="stat-icon score-icon"><i data-feather="heart"></i></div>
      <div class="stat-value" id="health-score">0</div>
      <div class="stat-label">Health Score</div>
    </div>

    <div class="overview-card stat-card">
      <div class="stat-icon avg-icon"><i data-feather="trending-up"></i></div>
      <div class="stat-value" id="weekly-avg">0%</div>
      <div class="stat-label">7-Day Avg</div>
    </div>
  </div>

  <!-- ── Habit Grid ── -->
  <div class="section-header">
    <h2>Today's Habits</h2>
    <button class="add-habit-btn" onclick="openHabitSheet()">
      <i data-feather="plus" style="width:16px;height:16px"></i>
      Add Habit
    </button>
  </div>

  <div class="habit-grid" id="habit-grid"></div>

  <!-- ── Health Metrics ── -->
  <div class="section-header" style="margin-top:28px;">
    <h2>Health Metrics</h2>
  </div>

  <div class="metrics-row">
    <div class="metric-card">
      <label>Weight (kg)</label>
      <input type="number" id="health-weight" class="metric-input" step="0.1" placeholder="—" oninput="autoSaveHealth()">
      <div class="bmi-display" id="bmi-display"></div>
    </div>
    <div class="metric-card">
      <label>Height (cm)</label>
      <input type="number" id="health-height" class="metric-input" step="1" placeholder="—" oninput="autoSaveHealth()">
    </div>
    <div class="metric-card">
      <label>Mood</label>
      <select id="health-mood" class="metric-input" onchange="autoSaveHealth()">
        <option value="">—</option>
        <option value="great">😄 Great</option>
        <option value="good">🙂 Good</option>
        <option value="neutral">😐 Neutral</option>
        <option value="low">😔 Low</option>
        <option value="bad">😞 Bad</option>
      </select>
    </div>
    <div class="metric-card">
      <label>Energy</label>
      <div class="energy-row">
        <input type="range" id="health-energy" min="1" max="10" value="5" class="energy-slider" oninput="updateEnergyLabel(); autoSaveHealth()">
        <span class="energy-val" id="energy-label">5</span>
      </div>
    </div>
    <div class="metric-card metric-wide">
      <label>Notes</label>
      <textarea id="health-notes" class="metric-input" rows="2" placeholder="How's your day going?" oninput="autoSaveHealth()"></textarea>
    </div>
  </div>

  <!-- ── Heatmap ── -->
  <div class="section-header" style="margin-top:28px;">
    <h2>30-Day Activity</h2>
  </div>
  <div class="heatmap-container" id="heatmap"></div>

</div>

<!-- ═══════════ HABIT SHEET (Add/Edit Modal) ═══════════ -->
<div id="habit-sheet" class="sheet-overlay hidden">
  <div class="sheet-card">
    <div class="sheet-header">
      <h3 id="sheet-title">New Habit</h3>
      <button class="modal-close" onclick="closeHabitSheet()"><i data-feather="x"></i></button>
    </div>

    <div class="form-group">
      <label>Habit Name</label>
      <input type="text" id="sheet-name" class="form-input" placeholder="e.g., Walking, Meditation">
    </div>

    <div class="sheet-row">
      <div class="form-group">
        <label>Unit</label>
        <input type="text" id="sheet-unit" class="form-input" placeholder="e.g., steps, mins, ml">
      </div>
      <div class="form-group">
        <label>Daily Goal</label>
        <input type="number" id="sheet-goal" class="form-input" placeholder="e.g., 8000" min="1">
      </div>
    </div>

    <div class="form-group">
      <label>Start Date</label>
      <input type="date" id="sheet-start" class="form-input">
    </div>

    <div class="form-group">
      <label>Type</label>
      <div class="type-toggle">
        <button class="type-btn active" data-type="number" onclick="setHabitType('number')">Numeric</button>
        <button class="type-btn" data-type="boolean" onclick="setHabitType('boolean')">Yes / No</button>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-primary" onclick="submitHabitSheet()">Save Habit</button>
      <button class="btn btn-ghost" onclick="closeHabitSheet()">Cancel</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='health.js') }}"></script>
<script>document.addEventListener("DOMContentLoaded",()=>{if(window.feather)feather.replace()});</script>
</body>
</html>
